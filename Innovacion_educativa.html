<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Ascenso - Innovación Educativa UNESCO</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Simulador: Innovación Educativa - UNESCO</h1>
        <p>Material de estudio basado en los Textos Pedagógicos del Magisterio</p>
    </header>

    <main id="quiz-container"></main>

    <script src="quiz-behavior.js"></script>
    <script>
        const quizData = [
            { q: "1. ¿Cuál es el impacto de convertir la sistematización de las prácticas en una constante para el docente?", options: ["a) Permite que el docente sea un ejecutor eficiente de políticas centrales.", "b) Convierte al sujeto de las prácticas en un creador y productor de saber."], correct: 1, retro: "Convierte al sujeto de las prácticas en un creador y productor de saber, permitiéndole reorientar su propio quehacer profesional." },
            { q: "2. ¿A qué se refiere la dimensión de una educación 'afincada en las matrices culturales y sociales'?", options: ["a) A las necesidades laborales del mercado internacional.", "b) A los estándares de evaluación del sistema.", "c) A la interculturalidad, asegurando que la educación esté enraizada en el territorio.", "d) A la equidad social como único mecanismo de resultados."], correct: 2, retro: "Hace referencia a la interculturalidad, asegurando que la educación esté enraizada en las matrices culturales del territorio." },
            { q: "3. ¿Bajo qué condición la introducción de tecnologías puede considerarse realmente una innovación?", options: ["a) Cuando la totalidad de alumnos aprueba con excelencia.", "b) Si el presupuesto permite actualización constante.", "c) Si producen transformaciones en el enfoque educativo, el rol docente o las estrategias.", "d) Si la mejora es puntual y no interfiere con la cultura vigente."], correct: 2, retro: "Solo si estas acciones producen transformaciones en el enfoque educativo, el rol del docente o las estrategias de enseñanza." },
            { q: "4. ¿Cómo describe el texto a los 'modelos mentales' y cuál es su efecto en la innovación?", options: ["a) Estructuras de pensamiento y creencias internalizadas que condicionan el actuar.", "b) Planes estratégicos diseñados por la dirección.", "c) Herramientas tecnológicas que restan confianza.", "d) Prejuicios de género y raciales exclusivos de lo rural."], correct: 0, retro: "Son estructuras de pensamiento y creencias internalizadas que condicionan nuestra forma de actuar, operando a menudo inconscientemente." },
            { q: "5. ¿Qué ocurre con la micropolítica institucional durante los periodos de cambio o innovación?", options: ["a) El poder político se vuelve invisible para preservar el status quo.", "b) Los docentes aceptan unánimemente las directrices.", "c) La interacción micropolítica tiende a intensificarse y se vuelve más visible.", "d) Las relaciones de poder desaparecen por un sistema cooperativo puro."], correct: 2, retro: "La interacción micropolítica tiende a intensificarse y se vuelve más visible, reflejando apoyos y oposiciones." },
            { q: "6. ¿Cuál es la distinción etimológica que hace el texto entre 'innovar' e 'inventar'?", options: ["a) Innovar es hallar una cosa nueva; inventar es alterar cosas.", "b) Innovar es mudar o alterar cosas introduciendo novedades; inventar es hallar algo nuevo.", "c) Son sinónimos de ruptura total con el pasado.", "d) Inventar es cuestionamiento constante; innovar es un producto acabado."], correct: 1, retro: "Innovar significa mudar o alterar las cosas introduciendo novedades, mientras que inventar significa hallar algo nuevo o desconocido." },
            { q: "7. ¿Qué implica para los docentes pasar de ser 'actores' a ser 'autores' del cambio?", options: ["a) Seguir fielmente el 'libreto' institucional.", "b) Ejecutar el papel establecido por normativas externas.", "c) El docente crea, define su papel y es causa de la acción.", "d) Capacidad de trabajar de forma aislada sin negociar."], correct: 2, retro: "Supone que el docente es quien crea, define su papel y es causa de la acción, expandiendo los límites al intervenir." },
            { q: "8. ¿Cuál es la característica central de la fase de 'Intencionalidad' en el ciclo de innovación?", options: ["a) Poner en práctica la planificación.", "b) La comunidad se interroga sobre qué quiere transformar y por qué.", "c) Identificación de recursos materiales.", "d) Balance final de resultados para sistematizar."], correct: 1, retro: "Es la fase donde la comunidad se interroga sobre qué quiere transformar y por qué, definiendo el horizonte a alcanzar." },
            { q: "9. En el caso de la Escuela Los Soches, ¿cuál fue el motivo principal para usar el agua como eje del currículo?", options: ["a) Cumplir lineamientos nacionales de ferias lúdicas.", "b) Deseo de sustituir la fiesta de Halloween.", "c) Problemas de salud en niños por consumo de agua contaminada.", "d) Obtención de financiamiento externo de COLCIENCIAS."], correct: 2, retro: "La identificación de problemas de salud en los niños debido al consumo de agua de baja calidad proveniente de quebradas contaminadas." },
            { q: "10. ¿Qué efecto tiene que un grupo de docentes haga público su trabajo y lo someta a discusión?", options: ["a) Genera parálisis institucional por temor a críticas.", "b) Aumenta la aptitud del grupo para enriquecer el proceso con aportaciones.", "c) Convierte la innovación en un producto acabado.", "d) Facilita el control total del director."], correct: 1, retro: "Aumenta la aptitud del grupo para mantener e incrementar su proceso innovador al enriquecerlo con otras aportaciones." },
            { q: "11. ¿En qué fase del ciclo de innovación es fundamental la flexibilidad ante imprevistos?", options: ["a) Sistematización.", "b) Implementación y desarrollo.", "c) Identificación de recursos.", "d) Evaluación diagnóstica inicial."], correct: 1, retro: "En la fase de implementación y desarrollo es fundamental que la flexibilidad tome en cuenta los imprevistos." },
            { q: "12. Según UNESCO (2014), ¿cuál es el cambio fundamental en la concepción del aprendizaje?", options: ["a) Acto espontáneo sin planificación.", "b) Priorizar el conocimiento academicista.", "c) El aprendizaje pasa de ser pasivo a ser una interacción que se construye.", "d) Aplicar políticas nacionales sin considerar contextos."], correct: 2, retro: "El aprendizaje pasa de ser pasivo a ser una interacción que se construye entre todos los actores." },
            { q: "13. ¿Qué factor es un índice de la madurez y autonomía de una institución frente a las normativas externas?", options: ["a) Cumplimiento estricto de horarios y libros oficiales.", "b) El grado en el que se adapta e incluso se recrea la normativa externa.", "c) Aislamiento de la escuela para evitar interferencias.", "d) Sustitución total de la norma nacional por reglamentos de padres."], correct: 1, retro: "El grado en el que se adapta e incluso se recrea la normativa externa a las características concretas del centro." },
            { q: "14. En micropolítica, ¿qué beneficio suelen recibir los docentes por su lealtad a los directores?", options: ["a) Apoyo político cuando surgen conflictos con estudiantes o padres.", "b) Asignación de mejores recursos tecnológicos.", "c) Permiso para no participar en autoevaluaciones.", "d) Garantía de no cuestionar sus modelos mentales."], correct: 0, retro: "El apoyo político de los directores cuando surgen conflictos con estudiantes o con los padres de familia." },
            { q: "15. En 'Evaluación y balance', ¿qué instrumentos son útiles para la sistematización?", options: ["a) Diarios, bitácoras e indicadores de resultados, procesos y estrategias.", "b) Facturas de recursos materiales.", "c) Pruebas estandarizadas nacionales.", "d) El currículo oficial sin adaptaciones."], correct: 0, retro: "Diarios, bitácoras e indicadores de resultados, procesos y estrategias son instrumentos útiles." },
            { q: "16. ¿Qué consecuencia tiene el 'carácter sistémico' de la innovación?", options: ["a) Permite cambios aislados sin afectar otros componentes.", "b) Cambios en un componente repercuten en los otros; hay que repensar todo.", "c) Limita la innovación estrictamente al aula.", "d) Garantiza que el cambio sea lineal y predecible."], correct: 1, retro: "Introducir cambios en un componente repercute en los otros, por lo que es necesario repensar todo el orden." },
            { q: "17. Según Paulo Freire, ¿qué concepto supone la innovación educativa?", options: ["a) Eficiencia administrativa.", "b) La 'conciencia utópica'.", "c) Aprendizaje individualista.", "d) Autopoiesis biológica."], correct: 1, retro: "Supone asumir una intencionalidad y la movilización de la 'conciencia utópica'." },
            { q: "18. En Escuela Los Soches, ¿qué tensión surgió respecto al tipo de saber?", options: ["a) TICs vs. libros tradicionales.", "b) Carnaval vs. Ludoteca.", "c) Saber local mágico-religioso vs. conocimiento científico.", "d) Responsabilidad de la escuela vs. de la Universidad."], correct: 2, retro: "Si debían mantener el saber local mágico-religioso de los niños o posibilitar el conocimiento científico." },
            { q: "19. ¿Cuál es un 'factor favorecedor' del cambio educativo según Blase y Blase?", options: ["a) Control riguroso de directores.", "b) Enfoque basado en liderazgo facilitador y gobierno compartido.", "c) Mantenimiento del status quo.", "d) Eliminación del debate político."], correct: 1, retro: "El empleo de un enfoque basado en el liderazgo facilitador y el gobierno compartido." },
            { q: "20. En Perú, ¿cuál objetivo del PEN se vincula con aprendizajes pertinentes?", options: ["a) Objetivo 1: Oportunidades iguales.", "b) Objetivo 3: Maestros preparados.", "c) Objetivo 2: Estudiantes e instituciones con aprendizajes pertinentes.", "d) Objetivo 4: Gestión descentralizada."], correct: 2, retro: "Objetivo 2: Estudiantes e instituciones que logran aprendizajes pertinentes y de calidad." },
            { q: "21. ¿Qué permite a la innovación no caer en la rutina?", options: ["a) Prohibición de nuevos cambios.", "b) Aplicación de modelos externos.", "c) Considerar la innovación un proceso inconcluso sujeto a revisión.", "d) Limitar la participación docente."], correct: 2, retro: "Considerar que la innovación es un proceso siempre inconcluso sujeto a revisión crítica constante." },
            { q: "22. ¿A qué se refiere el término 'autopoiesis' en la innovación?", options: ["a) Repetición mecánica de conductas.", "b) Organización de lo vivo, haciendo visible el carácter abierto del sistema.", "c) Rechazo sistemático de tecnología.", "d) Evaluación externa de eficiencia."], correct: 1, retro: "A la organización de lo vivo, haciendo visible el carácter abierto de cualquier sistema." },
            { q: "23. ¿Qué factor institucional actúa como obstáculo si se teme la censura?", options: ["a) Excesiva autonomía.", "b) Falta de clima de confianza y apoyo.", "c) Proyectos basados en preguntas de alumnos.", "d) Redes pedagógicas de intercambio."], correct: 1, retro: "La falta de un clima de confianza y apoyo que permita asumir riesgos." },
            { q: "24. En Los Soches, ¿quiénes recolectaron información sobre leyendas del agua?", options: ["a) Especialistas externos.", "b) Directivos distritales.", "c) Profesoras mediante investigación-acción participativa.", "d) Padres de familia del Carnaval."], correct: 2, retro: "Las profesoras de la institución educativa mediante investigación-acción participativa." },
            { q: "25. ¿Por qué el desequilibrio y confusión son naturales al inicio del cambio?", options: ["a) Falta de preparación académica docente.", "b) Confrontación necesaria entre viejas creencias y nuevas ideas.", "c) Imposición de modelos mentales jerárquicos.", "d) Ausencia de recursos tecnológicos."], correct: 1, retro: "Por la confrontación necesaria entre las viejas creencias y las nuevas prácticas e ideas." },
            { q: "26. ¿Por qué reflexionar sobre innovación en conjunto con otros docentes?", options: ["a) Identificar a quienes se oponen.", "b) Permite análisis profundo y soluciones con respaldo institucional.", "c) Seguir el mismo libreto sin variaciones.", "d) Cumplir normativas administrativas."], correct: 1, retro: "Porque permite un análisis más profundo y la construcción de soluciones con mayor respaldo institucional." },
            { q: "27. ¿Qué característica debe tener el trabajo en equipo para ser efectivo?", options: ["a) Estrictamente vertical.", "b) Relación de igualdad y complementariedad de puntos de vista.", "c) Evitar el pensamiento divergente.", "d) Excluir a familias."], correct: 1, retro: "Debe ser una relación de igualdad y complementariedad de enfoques y puntos de vista." },
            { q: "28. ¿Cuál es el 'objetivo general' del material de UNESCO estudiado?", options: ["a) Evaluar desempeño docente.", "b) Comprender dinámicas para que la institución se oriente a la innovación.", "c) Diseñar proyectos tecnológicos.", "d) Implementar modelos empresariales."], correct: 1, retro: "Comprender las dinámicas que permiten que una institución se oriente hacia la innovación." },
            { q: "29. Según el gráfico del ciclo, ¿qué pregunta guía la 'Planificación'?", options: ["a) ¿Con qué contamos?", "b) ¿Cómo lo vamos a hacer?", "c) ¿Qué aprendimos?", "d) ¿Qué se quiere transformar?"], correct: 1, retro: "¿Cómo lo vamos a hacer?" },
            { q: "30. La 'conciencia utópica' en la innovación implica que el cambio:", options: ["a) Es imposible de alcanzar.", "b) Supone intencionalidad de crear un nuevo orden.", "c) Se limita a mejoras financiadas externamente.", "d) Es aplicar fórmulas del pasado."], correct: 1, retro: "Supone asumir una intencionalidad de crear un nuevo orden en las prácticas." },
            { q: "31. ¿Qué acción clave se recomienda en 'Evaluación y balance'?", options: ["a) Redefinir la experiencia.", "b) Analizar información y apoyarse en especialistas.", "c) Definir horizonte pedagógico.", "d) Identificar financiamiento."], correct: 1, retro: "Analizar la información y apoyarse en especialistas si es necesario." },
            { q: "32. El texto afirma que la innovación no es 'lo nuevo solamente'. ¿Qué relación tiene?", options: ["a) Rechazo absoluto al pasado.", "b) Relación profunda con la tradición y modificaciones simbólicas.", "c) Generación espontánea.", "d) Modernización técnica."], correct: 1, retro: "Tiene una relación profunda con la tradición y produce modificaciones simbólicas." },
            { q: "33. ¿Por qué el poder político de ciertos grupos se da por sentado?", options: ["a) Cimentado en estructuras organizativas que preservan el status quo.", "b) El director tiene autoridad legal para sancionar.", "c) Docentes innovadores no participan en lo informal.", "d) Familias protegen la tradición."], correct: 0, retro: "Está cimentado en estructuras organizativas y culturales que preservan el status quo." },
            { q: "34. ¿Qué dificultad se detectó en el balance del proyecto del agua?", options: ["a) Rechazo total de niños de comunas.", "b) Dudas sobre cómo vincular el currículo con la temática del agua.", "c) Falta de interés de la Universidad.", "d) Prohibición de salidas pedagógicas."], correct: 1, retro: "Dudas sobre cómo vincular diferentes temas del currículo con la temática del agua." },
            { q: "35. Según Blanco (2005), ¿qué disposición es central para la capacidad innovadora?", options: ["a) Cumplir metas nacionales de eficiencia.", "b) Conectar con necesidades e intereses de familias y docentes.", "c) Competitividad económica.", "d) Velocidad de reemplazo docente."], correct: 1, retro: "Su disposición para conectar con las necesidades e intereses de familias, docentes y estudiantes." },
            { q: "36. La innovación es un acto 'deliberado y planificado' que busca superar:", options: ["a) Tradiciones territoriales.", "b) El paradigma tradicional y el conocimiento academicista pasivo.", "c) El liderazgo facilitador.", "d) El uso de redes pedagógicas."], correct: 1, retro: "El paradigma tradicional y el conocimiento academicista pasivo." },
            { q: "37. ¿Qué factor social ayuda a fortalecer los cambios educativos?", options: ["a) Aislamiento escolar.", "b) Apoyo político hacia programas basados en la escuela.", "c) Reformas 'de arriba abajo'.", "d) Silencio de los padres."], correct: 1, retro: "El apoyo político de las autoridades hacia los programas de desarrollo basado en la escuela." },
            { q: "38. En 'Implementación', ¿qué elemento permite redirigir ante imprevistos?", options: ["a) Cumplimiento rígido del cronograma.", "b) Reflexión permanente con pausas para el análisis.", "c) Sanción de errores.", "d) Individualismo."], correct: 1, retro: "Una reflexión permanente con las pausas necesarias para el análisis." },
            { q: "39. ¿Por qué es importante que los docentes también aprendan en la escuela?", options: ["a) Para no ser reemplazados.", "b) Porque la reflexión sobre su propio aprendizaje influye en sus estudiantes.", "c) Inventar contenidos desconocidos.", "d) Justificar bonos."], correct: 1, retro: "Porque la reflexión sobre sus propios intentos de aprender influye en cómo se ocupan de sus estudiantes." },
            { q: "40. ¿A qué se refiere la 'micropolítica facilitadora'?", options: ["a) Gestión de democracia simulada.", "b) Liderazgo que construye responsabilidad y autonomía.", "c) Poder informal para opositores.", "d) Exclusión docente de la crítica."], correct: 1, retro: "A un enfoque de liderazgo que construye responsabilidad y fomenta la autonomía y aceptación de riesgos." },
            { q: "41. En Los Soches, ¿qué relación existía con los desplazados?", options: ["a) Negativa a atenderlos.", "b) La escuela recibía el conflicto social atendiendo a diversos grupos.", "c) Construida para segregarlos.", "d) Financiaron la ludoteca."], correct: 1, retro: "La escuela recibía parte del conflicto social al atender a niños tanto de familias campesinas como de las comunas." },
            { q: "42. ¿A qué niveles puede ocurrir la innovación educativa?", options: ["a) Solo sistema nacional.", "b) Solo aula.", "c) Aula, institución y sistema escolar.", "d) Solo instituciones privadas."], correct: 2, retro: "A nivel de aula, de institución educativa y de sistema escolar." },
            { q: "43. ¿Qué implica la 'reflexión permanente' en la dinámica de aprendizajes?", options: ["a) Generación espontánea.", "b) Proceso que permite aprender de los errores cometidos.", "c) Evaluación solo al final de carrera.", "d) Aplicar teorías puras."], correct: 1, retro: "Establecer un proceso que permita aprender de los errores cometidos durante la práctica." },
            { q: "44. ¿Qué significa la metáfora de tocar 'jazz' en la innovación?", options: ["a) Seguir un libreto rígido.", "b) Caos sin planificación.", "c) Ir creando y corriendo los límites durante la acción.", "d) Producto estético sin impacto."], correct: 2, retro: "La innovación implica ir creando y corriendo los límites a medida que se desarrolla la acción." },
            { q: "45. ¿Cuál es un factor personal que impide el cambio?", options: ["a) Alta preparación para riesgos.", "b) Creencias formadas tempranamente que quitan seguridad.", "c) Reconocer modelos mentales.", "d) Compromiso grupal mediado."], correct: 1, retro: "Creencias formadas tempranamente que quitan seguridad y restan confianza para aprender algo nuevo." },
            { q: "46. ¿Cuál es el Objetivo Estratégico 6 del Proyecto Educativo Nacional?", options: ["a) Educación superior de calidad.", "b) Maestros preparados.", "c) Sociedad que educa ciudadanos y los compromete con su comunidad.", "d) Igualdad de resultados."], correct: 2, retro: "Una sociedad que educa a sus ciudadanos y los compromete con su comunidad." },
            { q: "47. En la fase de 'Planificación', ¿qué información es vital?", options: ["a) Situación de partida y claridad en responsabilidades.", "b) Lecciones de proyectos no implementados.", "c) Registro final en bitácoras.", "d) Informe de sistematización final."], correct: 0, retro: "Disponer de información sobre la situación de partida y claridad sobre las responsabilidades docentes." },
            { q: "48. ¿Qué misión pedagógica se propuso la Escuela Los Soches?", options: ["a) Eliminar el Carnaval.", "b) Cultivar la sensibilidad artística, lúdica, científica y social.", "c) Trasladarse a zona urbana.", "d) Capacitar solo a padres."], correct: 1, retro: "Despertar y cultivar la sensibilidad de los niños en campos artístico, lúdico, científico y social." },
            { q: "49. ¿Por qué es importante evitar el 'cambio por el cambio'?", options: ["a) Para no confundir familias.", "b) Para no rechazar el pasado sin conocerlo (actitud crítica).", "c) Solo es posible vía TICs.", "d) Asegurar aprendizaje pasivo."], correct: 1, retro: "Para no caer en la trampa de rechazar el pasado sin conocerlo, manteniendo una actitud crítica." },
            { q: "50. ¿Qué se entiende por 'sistematización' en la Fase 6?", options: ["a) Archivar documentos.", "b) Construcción colectiva de conocimiento y registro de experiencia.", "c) Recursos tecnológicos no usados.", "d) Opinión de expertos externos."], correct: 1, retro: "Un proceso de construcción colectiva del conocimiento donde se registra y comparte la experiencia." }
        ];
        shuffleOptions(quizData);

        const container = document.getElementById('quiz-container');

        quizData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `<div class="question-text">${item.q}</div>`;
            
            const list = document.createElement('ul');
            list.className = 'options';
            
            item.options.forEach((opt, optIndex) => {
                const li = document.createElement('li');
                li.innerText = opt;
                li.onclick = () => {
                    const allOptions = list.querySelectorAll('li');
                    allOptions.forEach(l => l.style.pointerEvents = 'none');
                    
                    const feedback = document.getElementById(`feedback-${index}`);
                    feedback.style.display = 'block';
                    
                    if (optIndex === item.correct) {
                        feedback.innerText = "¡Correcto! " + item.retro;
                        feedback.className = 'feedback correct';
                        li.classList.add('selected-correct');
                    } else {
                        feedback.innerText = "¡Incorrrecto!";
                        feedback.className = 'feedback incorrect';
                        li.classList.add('selected-incorrect');
                    }
                };
                list.appendChild(li);
            });
            
            card.appendChild(list);
            const feedbackDiv = document.createElement('div');
            feedbackDiv.id = `feedback-${index}`;
            feedbackDiv.className = 'feedback';
            card.appendChild(feedbackDiv);
            container.appendChild(card);
        });
    </script>
</body>
</html>
