<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Examen Ascenso 2026 - Diseño Curricular</title>

</head>
<body>
    <header>
        <h1>Simulador: Diseño, Desarrollo e Innovación del Currículum</h1>
        <p>Basado en el Banco de Preguntas - Magisterio de Bolivia</p>
    </header>

    <main id="quiz-container"></main>

    <script src="quiz-behavior.js"></script>
    <script>
        const quizData = [
            { q: "1. Según Kirk, ¿cuál es la función primordial de un currículum común o nuclear en un sistema democrático?", options: ["a) Establecer un control coercitivo sobre la labor docente.", "b) Sustituir la autonomía de los centros escolares.", "c) Garantizar el éxito escolar de las élites.", "d) Constituir una garantía para la igualdad y referente de mínimos de calidad."], correct: 3, retro: "Constituye una garantía para la igualdad, sirviendo como base de una educación integral y referente de los mínimos de calidad exigibles [1, 2]." },
            { q: "2. ¿Cómo se define la posición relativista o socioconstructivista respecto al valor del conocimiento escolar?", options: ["a) El conocimiento es una construcción social que refleja valores dominantes.", "b) El conocimiento debe reflejar fielmente una realidad externa objetiva.", "c) Los contenidos deben ser exclusivamente académicos.", "d) La relevancia radica en representar la herencia cultural universal."], correct: 0, retro: "Considera que el conocimiento es una construcción social que refleja valores dominantes y cuya utilidad depende de su provecho para el grupo [2, 3]." },
            { q: "3. ¿Qué principio defienden Bourdieu y Gros sobre la naturaleza de los programas escolares?", options: ["a) Deben ser instrumentos coercitivos y rígidos.", "b) Deben ser un marco de actuación flexible, interpretado por expertos y profesores.", "c) Priorizar modos de pensamiento sencillos para aprobar rápido.", "d) Evitar la interdisciplinariedad para mantener la pureza del saber."], correct: 1, retro: "Los programas deben ser un marco de actuación flexible, interpretado por expertos y profesores, distinguiendo lo obligatorio de lo opcional [4]." },
            { q: "4. ¿Cuál acción se considera fuera de la legitimidad administrativa en el ámbito pedagógico?", options: ["a) Dictar normas que regulen el sistema escolar.", "b) Establecer objetivos y contenidos mínimos exigibles.", "c) Prescribir sobre cuestiones metodológicas o formas de evaluación y agrupamiento.", "d) Señalar las áreas de contenido obligatorias."], correct: 2, retro: "Intervenir en aspectos profesionales como prescripciones sobre cuestiones metodológicas o formas de evaluación y agrupamiento está fuera de su legitimidad [5]." },
            { q: "5. ¿Cuál es un motivo fundamental para que el centro escolar realice sus propios proyectos?", options: ["a) Eliminar la necesidad de coordinarse con otros centros.", "b) Ser el contexto organizador de la enseñanza y marco para la innovación.", "c) Permitir que cada maestro dicte contenidos de forma aislada.", "d) Reducir la participación de la comunidad extraescolar."], correct: 1, retro: "Es el contexto organizador de la enseñanza y el marco idóneo para plantear propuestas de innovación y desarrollo profesional coordinado [6, 7]." },
            { q: "6. Siguiendo a Stenhouse, ¿en qué debe centrarse el diseño del currículum en el aula?", options: ["a) Descripción detallada de conductas observables.", "b) Aplicación automática de la cultura seleccionada en el currículum base.", "c) Organización de contenidos, actividades valiosas y análisis de experiencias.", "d) Eliminación de los procesos de evaluación constante."], correct: 2, retro: "Debe centrarse en la organización de contenidos, la selección de actividades valiosas y el análisis constante de las experiencias de aprendizaje [8]." },
            { q: "7. ¿Qué riesgo menciona el texto al aplicar automáticamente los últimos paradigmas científicos a la escuela?", options: ["a) Que el conocimiento vulgar sustituya al científico.", "b) Que los maestros se nieguen a enseñar contenidos tradicionales.", "c) Adopción de enfoques excesivamente complejos que provocan fracaso escolar.", "d) Que el currículum pierda su validez moral en pocos meses."], correct: 2, retro: "Se pueden adoptar enfoques excesivamente complejos para determinados niveles educativos, provocando dificultad y fracaso escolar [9, 10]." },
            { q: "8. ¿Qué función debe cumplir el criterio socioideológico en la selección de contenidos?", options: ["a) Ignorar las carencias socioculturales de los alumnos.", "b) Evaluar las carencias socioculturales y adecuar la selección de contenidos.", "c) Garantizar que las disciplinas se trabajen como verdades absolutas.", "d) Priorizar contenidos 'poco académicos' sin utilidad cultural."], correct: 1, retro: "Debe ayudar a evaluar las carencias socioculturales de los alumnos y adecuar la selección de contenidos por parte del profesor [10, 11]." },
            { q: "9. ¿En qué se fundamenta la globalización propuesta originalmente por Decroly?", options: ["a) Relación de conocimientos de distintas materias para saber nuevo.", "b) Necesidad de evitar la repetición de conocimientos comunes.", "c) Adecuar el conocimiento al modo de pensar sincrético del niño (centros de interés).", "d) Imposición de una jerarquía de ciencias exactas."], correct: 2, retro: "Se basa en adecuar el conocimiento al modo de pensar sincrético y global de los niños pequeños, mediante centros de interés [12, 13]." },
            { q: "10. ¿Qué aspecto debe considerarse al planificar actividades en su dimensión social?", options: ["a) Propiciar rutinas y hábitos que agilicen las relaciones y normas claras.", "b) Fomentar la competitividad extrema entre estudiantes.", "c) Evitar el trabajo en grupo para no distraerse.", "d) Reducir la motivación para asegurar procesos mecánicos."], correct: 0, retro: "Propiciar entre los alumnos rutinas y hábitos que agilicen las relaciones y establecer normas claras sobre las acciones [13, 14]." },
            // ... Se continuará el mapeo de las 50 preguntas según la clave de respuestas [15, 16]
            { q: "11. ¿En qué sentidos se bifurca el concepto de currículum en nuestro idioma?", options: ["a) Manual de funciones y reglamento interno.", "b) Lista de materias y certificado de notas.", "c) Recorrido de vida (CV) y carrera del estudiante con contenidos organizados.", "d) Leyes educativas y resultados de pruebas internacionales."], correct: 2, retro: "Se refiere al recorrido de la vida y logros personales (curriculum vitae) y a la carrera del estudiante y sus contenidos organizados [17, 18]." },
            { q: "12. ¿Cuál era la orientación del trivium en la Edad Media?", options: ["a) Materias aplicadas como Astronomía y Música.", "b) Modos de adquirir conocimiento: Gramática, Retórica y Dialéctica.", "c) Finalidad pragmática basada en Aritmética.", "d) Formación militar y preparación ciudadana."], correct: 1, retro: "Se refería a los modos de adquirir el conocimiento e incluía la Gramática, la Retórica y la Dialéctica [18, 19]." },
            { q: "13. ¿Qué efecto tuvo la invención de los grados relacionados con la edad?", options: ["a) Trabajo conjunto de capacidades diversas.", "b) Coherencia vertical, ordenando el tiempo escolar y la progresión.", "c) Eliminó la necesidad de especialistas por asignatura.", "d) Garantizó que el aprendizaje fuera fragmentado y arbitrario."], correct: 1, retro: "Proporcionó coherencia vertical a la enseñanza, ordenando el tiempo escolar y definiendo qué es la progresión [19, 20]." },
            { q: "14. Según Gimeno Sacristán, ¿sobre qué elementos ejerce el currículum su poder regulador?", options: ["a) Elección de libros de texto únicamente.", "b) Vida privada de los docentes.", "c) Cuándo se aprende, qué se adquiere, ritmo y modelo de individuo 'normal'.", "d) Pago de haberes y asignación de ítems."], correct: 2, retro: "Ejerce poder sobre cuándo se aprende, qué conocimiento se adquiere, el ritmo de progresión y el modelo de individuo 'normal' [21, 22]." },
            { q: "15. ¿Qué sucede con un tema científico al entrar en el molde escolar?", options: ["a) Mantiene su pureza científica original.", "b) Se convierte automáticamente en saber vulgar.", "c) Su naturaleza es modelada por códigos de texto, método y evaluación.", "d) Es sustituido íntegramente por experiencia directa."], correct: 2, retro: "Su naturaleza es modelada por los códigos del currículum, el texto, el método y las pruebas de evaluación [22, 23]." },
            { q: "16. ¿Cuáles son los agentes culturales mediadores más inmediatos?", options: ["a) Profesores, libros de texto y materiales didácticos.", "b) Directores distritales y juntas escolares.", "c) Medios de comunicación e Internet.", "d) Arquitectos y fabricantes de mobiliario."], correct: 0, retro: "Los profesores, los libros de texto y los materiales didácticos son los mediadores inmediatos [23, 24]." },
            { q: "17. ¿Cuál es un ejemplo de opción con poder estructurante invisible?", options: ["a) Derecho a educación básica y común.", "b) Materias en tramos horarios fijos y separadas por asignaturas.", "c) Deseo de emancipación humana.", "d) Investigación autónoma de un tema."], correct: 1, retro: "La aceptación de que las materias se desarrollen en tramos horarios fijos y separadas por asignaturas [24, 25]." },
            { q: "18. ¿Por qué se produce una dinámica conflictiva en el desarrollo del currículum?", options: ["a) Oposición de padres a las ciencias.", "b) Falta de presupuesto para impresión de textos.", "c) Choque entre carga utópica y éxito escolar medible.", "d) Preferencia docente por no tener objetivos."], correct: 2, retro: "Se produce porque la carga utópica y los fines generales chocan con prácticas que reducen el currículum al éxito escolar medible [26, 27]." },
            { q: "19. ¿Cuál es un fin formativo mencionado por el autor para los profesores?", options: ["a) Memorización del 100% de fechas históricas.", "b) Concienciar sobre la complejidad del mundo y la deliberación democrática.", "c) Evitar discusión sobre temas polémicos.", "d) Evaluar únicamente resultados cuantificables."], correct: 1, retro: "Hacer consciente al alumno de la complejidad del mundo, de su diversidad y capacitarlo para la deliberación democrática [27, 28]." },
            { q: "20. En la visión procesual, ¿qué constituye el tercer plano del currículum?", options: ["a) Fines y motivos en el texto oficial.", "b) Pruebas de evaluación ministerial.", "c) Acciones y actividades que se desarrollan en la práctica.", "d) El poso obtenido por el alumno al finalizar el año."], correct: 2, retro: "Son las acciones y actividades que se desarrollan en la práctica, que constituyen los métodos visibles de enseñanza [28, 29]." },
            { q: "21. ¿Qué implica la 'sospecha epistémica' respecto a la enseñanza?", options: ["a) Un buen texto garantiza aprendizaje automático.", "b) La enseñanza no equivale al aprendizaje y el decir no es el hacer.", "c) Los profesores no son responsables de los resultados.", "d) La realidad visible es la única fuente fiable."], correct: 1, retro: "Implica que la enseñanza no equivale al aprendizaje y que lo que decimos que hacemos puede tener poco reflejo en lo que hacemos [30]." },
            { q: "22. ¿Qué tipo de luchas se reflejan en el currículum?", options: ["a) Entre autores de libros por el mercado.", "b) Corporativas, políticas, económicas, religiosas y culturales.", "c) Personales por el uso de laboratorios.", "d) Entre estudiantes por mejores notas."], correct: 1, retro: "Refleja luchas corporativas, políticas, económicas, religiosas, identitarias y culturales de diferentes sectores sociales [31, 32]." },
            { q: "23. En el enfoque tradicional, ¿cuál es el papel del libro de texto?", options: ["a) Fuente cuestionable para investigación.", "b) Agente exclusivo del desarrollo y canon indiscutible del saber.", "c) Pretexto para actividades creativas.", "d) Desaparecer para que solo hable el docente."], correct: 1, retro: "Se convierte en el agente prácticamente exclusivo del desarrollo del currículum y en el canon indiscutible del saber [32, 33]." },
            { q: "24. ¿Qué exigencia impone el giro constructivista al conocimiento escolar?", options: ["a) Ignorar representaciones culturales previas.", "b) Considerar concepciones previas, representaciones y significados del alumno.", "c) Centrarse en la maduración biológica únicamente.", "d) Prohibir significados públicos compartidos."], correct: 1, retro: "Debe considerar las concepciones previas, representaciones y significados populares propios del estudiante [34]." },
            { q: "25. ¿Qué consecuencia tiene la 'vocacionalización' de los currícula?", options: ["a) Incremento de humanidades y cultura clásica.", "b) Selección de contenidos por su valor de aplicación (ciencia sobre arte).", "c) Eliminación de asignaturas técnicas.", "d) Ajuste perfecto a un mercado estático."], correct: 1, retro: "La selección de contenidos por su valor de aplicación, lo que hace ascender a las matemáticas y las ciencias frente a las artes [35, 36]." },
            { q: "26. ¿Cómo define Walzer la 'igualdad simple'?", options: ["a) Derecho de familias a elegir educación privada.", "b) Enseñanza con contenidos y fines comunes integradora.", "c) Clasificación por categorías de rendimiento.", "d) Sometimiento a un patrón de pensamiento único."], correct: 1, retro: "Una enseñanza con contenidos y fines comunes que aspira a una educación integradora para sujetos muy diversos [36]." },
            { q: "27. Según el autor, ¿cuándo se vuelve intolerable la diferencia?", options: ["a) Cuando se aprende al propio ritmo.", "b) Cuando supone una desigualdad que impide participar de bienes sociales.", "c) Cuando la escuela respeta identidades singulares.", "d) Cuando un estudiante decide ser original."], correct: 1, retro: "Cuando la diferencia supone una desigualdad que impide participar de los bienes sociales, económicos y culturales [37, 38]." },
            { q: "28. ¿Cómo surge técnicamente la idea de fracaso escolar?", options: ["a) Inevitabilidad por falta de inteligencia.", "b) Exclusión interna que 'etiqueta' a quien no supera la norma.", "c) Invento de pedagogos críticos.", "d) Falta de materiales estandarizados."], correct: 1, retro: "Surge como una forma de exclusión interna que 'etiqueta' a quienes no superan la norma en una escolaridad obligatoria [39]." },
            { q: "29. ¿Qué resistencia menciona el texto respecto al bachillerato?", options: ["a) Voluntad de prolongar la formación general.", "b) Dificultad de aceptar que todos pueden beneficiarse de cultura académica.", "c) Deseo de eliminar asignaturas clásicas.", "d) Insistencia en aprobar sin esfuerzo."], correct: 1, retro: "La dificultad de aceptar que todos pueden beneficiarse de una cultura que históricamente era restringida y académica [40, 41]." },
            { q: "30. ¿Qué concepto de 'educando' surge del modelo Taylorista graduado?", options: ["a) Ser irrepetible y original.", "b) Alumno clasificado en etapas, cursos y categorías de adelanto/retraso.", "c) Ciudadano responsable transformador.", "d) Sujeto invisible para la psicología."], correct: 1, retro: "Un alumno diversificado y clasificado en etapas, cursos, edades mentales y categorías de 'adelanto' o 'retraso' [41, 42]." },
            { q: "31. ¿En qué eje se ha anclado la mentalidad pedagógica de los profesores?", options: ["a) Defensa de la escuela laica.", "b) Docencia dirigida a grupos homogeneizados.", "c) Eliminación de categorías de clasificación.", "d) Uso de la evaluación formativa siempre."], correct: 1, retro: "En la docencia dirigida a grupos homogeneizados según la edad, la capacidad o el nivel de rendimiento [42, 43]." },
            { q: "32. ¿Cuál es una virtud de la idea de ciclo mencionada por el autor?", options: ["a) Frenar especialización, acoger ritmos y restar controles selectivos.", "b) Incrementar regulación diagnóstica exhaustiva.", "c) Mantener esquemas del bachillerato tradicional.", "d) Garantizar progreso rígido de cohorte."], correct: 0, retro: "Frenar los efectos de la especialización de profesores, dar acogida a ritmos diferentes y restar controles selectivos [44, 45]." },
            { q: "33. ¿Qué sugiere el autor para diferenciar sin segregar?", options: ["a) Currícula totalmente diferentes desde el inicio.", "b) Consensos sobre lo básico y dar más tiempo/recursos al que necesite.", "c) Prohibir que los más capaces avancen solos.", "d) Usar un solo libro idéntico para todos."], correct: 1, retro: "Lograr consensos sobre lo básico y emplear más tiempo y recursos en quienes lo necesiten para alcanzar esa meta [45]." },
            { q: "34. ¿Qué evita la fórmula de la escuela comprensiva?", options: ["a) Elección de educación religiosa privada.", "b) División de alumnos de misma edad en centros con distintos destinos sociales.", "c) Intervención del Estado en materiales.", "d) Adaptación a diferentes capacidades."], correct: 1, retro: "Evita que los estudiantes de una misma edad se dividan en tipos de centros con currícula y destinos sociales diferentes [46, 47]." },
            { q: "35. ¿Qué crítica realiza Feito a la escuela actual?", options: ["a) Preocupación excesiva por el éxito de todos.", "b) Contenidos se olvidan y busca librarse de alumnos menos académicos.", "c) Eliminación de conocimientos canónicos.", "d) Fomento excesivo de la cooperación."], correct: 1, retro: "Los contenidos se olvidan con facilidad y la escuela parece más preocupada por librarse de los alumnos menos académicos [47, 48]." },
            { q: "36. Según Feito, ¿qué curso se ha convertido en una 'academia para selectividad'?", options: ["a) Nivel inicial.", "b) Primer ciclo primaria.", "c) Segundo de bachillerato.", "d) Cuarto de ESO."], correct: 2, retro: "Segundo de bachillerato, perdiendo su función de aprender en favor del éxito en la prueba de acceso [15, 49]." },
            { q: "37. ¿Qué ejemplo de omisión destaca Feito en el currículum oficial?", options: ["a) Matemáticas avanzadas en primaria.", "b) Conocimiento de salud, derecho o uso crítico de medios.", "c) Caligrafía tradicional.", "d) Instrucción militar adolescentes."], correct: 1, retro: "El conocimiento de la salud (medicina), el derecho o el uso reflexivo y crítico de los medios de comunicación [50, 51]." },
            { q: "38. Basándose en Freire, ¿en qué consiste el modelo dominante de enseñanza?", options: ["a) Considerar alumnos para transformación colectiva.", "b) Ver cabezas de alumnos como recipientes vacíos para llenar.", "c) Organizar equipos de investigación documental.", "d) Suministrar herramientas para crear saber propio."], correct: 1, retro: "En concebir las cabezas de los estudiantes como recipientes vacíos que hay que llenar de contenidos del profesor [51, 52]." },
            { q: "39. ¿Qué significa comprender las cosas sistémicamente?", options: ["a) Análisis exhaustivo de partes por separado.", "b) Colocarlas en contexto y establecer naturaleza de relaciones.", "c) Memorizar fragmentos aislados.", "d) Ignorar interconexiones."], correct: 1, retro: "Colocarlas en un contexto y establecer la naturaleza de sus relaciones; el todo es más que la suma de sus partes [52, 53]." },
            { q: "40. ¿En qué destaca alguien con inteligencia intra-personal?", options: ["a) Liderar y organizar conflictos.", "b) Entenderse a sí mismo, puntos fuertes y debilidades.", "c) Lectura de mapas y visualización.", "d) Entender naturaleza y flora/fauna."], correct: 1, retro: "En entenderse a sí mismo, reconociendo sus puntos fuertes, debilidades y estableciendo objetivos [53, 54]." },
            { q: "41. ¿Por qué el currículum real nunca es la estricta intención del maestro?", options: ["a) Supervisión de inspectores administrativos.", "b) Resistencias de alumnos y avatares de la práctica.", "c) Libros de texto demasiado completos.", "d) Alumnos siempre de acuerdo."], correct: 1, retro: "Porque las resistencias de los alumnos y los avatares de la práctica obligan a una negociación y confrontación [55]." },
            { q: "42. ¿Cuál es la función social del currículum oculto?", options: ["a) Cuestionar toda forma de autoridad.", "b) Interiorizar orden moral, social, disciplina y jerarquías.", "c) Fomentar creatividad absoluta.", "d) Impedir ser trabajador serio."], correct: 1, retro: "Hacer que los individuos interioricen el orden moral, social, la disciplina y el respeto a las jerarquías [56, 57]." },
            { q: "43. ¿Qué significa aprender a 'vivir dentro de una masa' según Jackson?", options: ["a) Expresarse libremente sin restricción.", "b) Acostumbrarse a intimidad débil, mirada ajena y diferir deseos.", "c) Influir en el ritmo de trabajo con distracciones.", "d) Evaluación de padres fuera del recinto."], correct: 1, retro: "Acostumbrarse a la intimidad débil, estar bajo la mirada de otros y diferir la satisfacción de deseos personales [57, 58]." },
            { q: "44. ¿Qué implica tener éxito en la escuela según el 'oficio de alumno'?", options: ["a) Memorizar el 100% formal sin normas convivencia.", "b) Aprender reglas del juego de organización y no perturbar orden.", "c) Cuestionar al maestro con alternativas lúdicas.", "d) Ignorar cultura organizacional."], correct: 1, retro: "Aprender las reglas del juego de la organización y desempeñar el papel de alumno sin perturbar el orden [58, 59]." },
            { q: "45. ¿Qué disciplinas se consideran a menudo poco selectivas?", options: ["a) Matemáticas y lengua castellana.", "b) Historia y geografía nacionales.", "c) Educación física o artística.", "d) Informática e idiomas modernos."], correct: 2, retro: "La educación física o artística, donde la ausencia de aprendizajes no suele obstaculizar el trabajo posterior [60, 61]." },
            { q: "46. ¿Cómo describe Perrenoud el trabajo escolar?", options: ["a) Actividad creativa basada en elección personal.", "b) No retribuido, impuesto, fragmentado, repetitivo y supervisado.", "c) Labor lucrativa remunerada.", "d) Producto oculto sin intervención personal docente."], correct: 1, retro: "Como un trabajo no retribuido, impuesto, fragmentado, repetitivo y supervisado constantemente [61, 62]." },
            { q: "47. ¿Cuál es el riesgo de que el libro de texto sea la única fuente?", options: ["a) Aprender uso crítico de soportes múltiples.", "b) Depauperación cultural y reducción de materiales lectura.", "c) Incremento calidad por especialización.", "d) Creer más en puntos cardinales que en el súper."], correct: 1, retro: "La depauperación cultural y la reducción drástica de las formas, funciones y materiales de lectura [62, 63]." },
            { q: "48. ¿A qué se refiere el término 'experiencia vicaria'?", options: ["a) Viajar personalmente a la Luna o guerra.", "b) Acudir al archivo de experiencia de otros de forma indirecta.", "c) Uso de imágenes intuitivas sin signos abstractos.", "d) Contacto con abuelos para lenguaje."], correct: 1, retro: "A tener que acudir al archivo de la experiencia de otros que solo de forma indirecta podemos hacer nuestra [64]." },
            { q: "49. ¿Qué sentimiento asocia el alumno a un libro de matemáticas?", options: ["a) Placer de lectura en tiempo libre.", "b) Objeto ligado a tareas y evaluación: éxito es abandonarlo.", "c) Manual consulta permanente de por vida.", "d) Soporte tecnológico que sustituye clases."], correct: 1, retro: "Un objeto ligado a tareas académicas y evaluación, cuya señal de éxito es poder abandonarlo [65]." },
            { q: "50. Según Gimeno, ¿dónde reside el verdadero peligro para la lectura?", options: ["a) Falta de libros en áreas rurales.", "b) Competencia de Internet y smartphones.", "c) Desafortunadas prácticas dominantes de leer en la escuela.", "d) Profusión de imágenes en el mercado."], correct: 2, retro: "En las desafortunadas prácticas dominantes de leer a las que sometemos a los alumnos durante la escuela [15, 66]." }
        ];
        shuffleOptions(quizData);

        const container = document.getElementById('quiz-container');

        quizData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${index}`;
            card.innerHTML = `<div class="question-text">${item.q}</div>`;
            
            const list = document.createElement('ul');
            list.className = 'options';
            
            item.options.forEach((opt, optIdx) => {
                const li = document.createElement('li');
                li.innerText = opt;
                li.onclick = () => {
                    // Bloquear selección posterior para esta pregunta
                    const allOptions = list.querySelectorAll('li');
                    allOptions.forEach(l => l.style.pointerEvents = 'none');
                    
                    const feedbackDiv = document.getElementById(`feed-${index}`);
                    feedbackDiv.style.display = 'block';
                    
                    if (optIdx === item.correct) {
                        feedbackDiv.innerText = "¡Correcto! " + item.retro;
                        feedbackDiv.className = 'feedback correct';
                        li.style.backgroundColor = '#d4edda';
                        li.style.borderColor = '#28a745';
                    } else {
                        feedbackDiv.innerText = "¡Incorrrecto!";
                        feedbackDiv.className = 'feedback incorrect';
                        li.style.backgroundColor = '#f8d7da';
                        li.style.borderColor = '#dc3545';
                    }
                };
                list.appendChild(li);
            });
            
            card.appendChild(list);
            const feedbackDiv = document.createElement('div');
            feedbackDiv.id = `feed-${index}`;
            feedbackDiv.className = 'feedback';
            card.appendChild(feedbackDiv);
            container.appendChild(card);
        });
    </script>
</body>
